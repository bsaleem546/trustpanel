services:
  postgres:
    image: postgres:15-alpine
    container_name: trustpanel-postgres
    environment:
      POSTGRES_DB: trustpanel
      POSTGRES_USER: trustpanel
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - trustpanel-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustpanel -d trustpanel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trustpanel-redis
    ports:
      - "6379:6379"
    volumes:
      - trustpanel-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: trustpanel-meilisearch
    environment:
      MEILI_MASTER_KEY: replace-me
    ports:
      - "7700:7700"
    volumes:
      - trustpanel-meilisearch:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: trustpanel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: trustpanel
      MINIO_ROOT_PASSWORD: change-me-please
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - trustpanel-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  trustpanel-postgres:
  trustpanel-redis:
  trustpanel-meilisearch:
  trustpanel-minio:
