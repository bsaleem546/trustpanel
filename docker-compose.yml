services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5065:8080"
    env_file: ./backend/.env
    environment:
      # Override connection strings so the app reaches the other containers by service name.
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-trustpanel};Username=${POSTGRES_USER:-trustpanel};Password=${POSTGRES_PASSWORD}"
      REDIS_CONNECTION: "redis:6379,password=${REDIS_PASSWORD}"
      MEILISEARCH_URL: "http://meilisearch:7700"
    volumes:
      - keys-data:/app/keys
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    env_file: ./backend/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trustpanel} -d ${POSTGRES_DB:-trustpanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    env_file: ./backend/.env
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.8
    env_file: ./backend/.env
    environment:
      MEILI_MASTER_KEY: "${MEILISEARCH_MASTER_KEY}"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  meilisearch-data:
  keys-data:
